# Robot hardware configuration
# All CAN IDs, joint limits, and physical parameters in one place.

bus:
  transport: ch341
  port: COM5
  socketcan_interface: can0
  baud: 921600
  can_bitrate: 1000000
  host_id: 0xAA

# Actuator types
actuators:
  rs03:
    max_torque: 60.0      # N*m peak
    max_speed: 50.0       # rad/s
    max_current: 30.0     # A
    gear_ratio: 9.0
    weight_kg: 0.88
    voltage_nominal: 48   # V

# Body structure
# can_id: set per-motor after assignment
# limits: mechanical range in radians
#
# For this torso-mounted layout, “straight down” is a fixed angle per joint in this frame — set
# home_rad to that value (CAD / calibration). straight_down_home_at_startup only if you want each
# run to SetZero while physically holding straight down (forces home to 0 after zero).

arm_left:
  shoulder_pitch:
    can_id: 8
    actuator: rs03
    limits: [-1.57, 3.14] # -90 to 180 deg
    home_rad: 0.0         # rad when upper arm points straight down for this mount (change if your zero convention differs)
    straight_down_home_at_startup: false
    # startup_recovery:   # optional; see defaults in config.rs
    #   approach_enabled: true
    #   approach_max_step_rad: 0.12
    #   approach_kp: 20.0
    #   approach_kd: 1.0
    #   approach_step_period_ms: 25
    #   approach_handoff_rad: 0.28
    #   approach_max_secs: 45.0
    #   resistance_torque_nm: 12.0
    #   resistance_velocity_rads: 0.15
    #   resistance_confirm_ticks: 2
    #   resistance_backoff_ms: 1000   # (alias resistance_hold_ms)
    #   post_stall_motion_scale: 0.5
    #   prefer_shortest_angle: true   # shortest arc only if linear error > π; settle stays linear
    #   stall_detection_min_linear_error_rad: 0.26
    #   recovery_direct_command_within_rad: 0.12  # gradual: soft hold on home in this band
  shoulder_roll:
    can_id: null
    actuator: rs03
    limits: [0.0, 3.14]   # 0 to 180 deg
  upper_arm_yaw:
    can_id: null
    actuator: rs03
    limits: [-1.57, 1.57] # -90 to 90 deg
  elbow_pitch:
    can_id: null
    actuator: rs03
    limits: [0.0, 2.36]   # 0 to 135 deg

arm_right:
  shoulder_pitch:
    can_id: null
    actuator: rs03
    limits: [-1.57, 3.14]
  shoulder_roll:
    can_id: null
    actuator: rs03
    limits: [-3.14, 0.0]
  upper_arm_yaw:
    can_id: null
    actuator: rs03
    limits: [-1.57, 1.57]
  elbow_pitch:
    can_id: null
    actuator: rs03
    limits: [-2.36, 0.0]

waist:
  rotation:
    can_id: null
    actuator: openqdd      # Different actuator type
    limits: [-1.57, 1.57]  # -90 to 90 deg

head:
  # Future: pan/tilt servos, cameras, etc.

torso:
  frame: 2020_extrusion
  dimensions_mm: [460, 200, 160]  # height, width, depth
